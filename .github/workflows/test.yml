name: Send Reminder # 名前も本番っぽく変更してOKです

on:
  schedule:
    # 日本時間の毎週日曜日 18:00（UTCの09:00）に実行
    # cronの書式: '分 時 日 月 曜日(0が日曜日)'
    - cron: '0 9 * * 0'
  workflow_dispatch: {} # 手動でテスト実行できるボタンは残しておくと便利です

jobs:
  test-send:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run script for testing
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO_TEST_GROUP }} # テスト用グループのID
          REMINDER_MESSAGE: "【テスト】Messaging APIからの送信テストです"
        run: |
          python scripts/send_reminder.py