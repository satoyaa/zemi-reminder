name: Test Reminder (Scraping)

on:
  # テスト用なので定期実行(cron)は外し、手動実行のみにしています
  workflow_dispatch: {}

jobs:
  test-send:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # スクレイピング用のライブラリを追加でインストール
          pip install requests beautifulsoup4
          
      - name: Run script for testing
        env:
          # LINE APIの設定（送信先をテスト用グループのIDに指定）
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO_TEST_GROUP }}
          
          # 社内サービスログイン用の設定
          SERVICE_LOGIN_ID: ${{ secrets.SERVICE_LOGIN_ID }}
          SERVICE_PASSWORD: ${{ secrets.SERVICE_PASSWORD }}

          # URL設定
          LOGIN_URL: ${{ secrets.LOGIN_URL }}
          SCHEDULE_URL: ${{ secrets.SCHEDULE_URL }}
        run: |
          python scripts/send_reminder.py