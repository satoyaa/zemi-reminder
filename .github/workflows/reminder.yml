name: Send LINE Reminder

on:
  schedule:
    # 毎日20:00 JST (UTC 11:00) に実行
    - cron: '0 11 * * *'
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    concurrency:
      group: send-line-reminder
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
          
      - name: Run reminder
        env:
          # LINE APIの設定
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO_GROUP }}
          
          # ログイン情報（既存）
          SERVICE_LOGIN_ID: ${{ secrets.SERVICE_LOGIN_ID }}
          SERVICE_PASSWORD: ${{ secrets.SERVICE_PASSWORD }}

          # --- 修正点：URLをSecretsから取得する設定を追加 ---
          LOGIN_URL: ${{ secrets.LOGIN_URL }}
          SCHEDULE_URL: ${{ secrets.SCHEDULE_URL }}
          # ---------------------------------------------
        run: |
          python scripts/send_reminder.py