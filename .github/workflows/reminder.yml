name: Send LINE Reminder

on:
  schedule:
    # 日本時間の毎週日曜日 18:00（UTCの 09:00）に実行
    - cron: '0 9 * * 0'
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    concurrency:
      group: send-line-reminder
      cancel-in-progress: true
    steps:
      # Node.js 20の非推奨警告を消すため、v4からv5にアップデート
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run reminder
        env:
          # LINE Notify用の設定からMessaging API用の設定へ変更
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          # 本番環境で送信したいLINEグループのIDを指定します
          LINE_TO: ${{ secrets.LINE_TO_GROUP }}
        run: |
          python scripts/send_reminder.py